[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322

# Public functions — called without Authorization header
[functions.get-products]
verify_jwt = false
[functions.get-payment-methods]
verify_jwt = false
[functions.create-checkout]
verify_jwt = false
[functions.collect-email]
verify_jwt = false
[functions.payment-webhook]
verify_jwt = false
# Called from Flutter apps without user auth
[functions.activate-device]
verify_jwt = false
[functions.premium-status]
verify_jwt = false


[auth]
enabled = true
site_url = "https://minu.tarksober.ee"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/auth/callback", "https://minu.tarksober.ee", "https://minu.tarksober.ee/auth/callback"]

[auth.email]
enable_signup = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600
